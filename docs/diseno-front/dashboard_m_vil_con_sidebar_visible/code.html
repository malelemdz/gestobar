<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;family=JetBrains+Mono:wght@600&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #111317;
            color: #e2e2e8;
            -webkit-font-smoothing: antialiased;
        }
        /* Custom scrollbar for compact feel */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #3b494b;
            border-radius: 10px;
        }
    </style>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "secondary-fixed": "#e9ddff",
                    "primary": "#dbfcff",
                    "on-tertiary-fixed-variant": "#8f0041",
                    "on-secondary-container": "#ddcdff",
                    "inverse-primary": "#006970",
                    "on-secondary-fixed-variant": "#5700c9",
                    "surface-container-highest": "#333539",
                    "on-primary-fixed-variant": "#004f54",
                    "primary-fixed": "#7df4ff",
                    "on-tertiary-container": "#bb0058",
                    "on-primary-container": "#006970",
                    "secondary": "#d1bcff",
                    "on-primary": "#00363a",
                    "tertiary-container": "#ffccd6",
                    "on-tertiary": "#66002c",
                    "inverse-surface": "#e2e2e8",
                    "surface-container": "#1e2024",
                    "inverse-on-surface": "#2f3035",
                    "tertiary-fixed": "#ffd9e0",
                    "surface-container-lowest": "#0c0e12",
                    "on-background": "#e2e2e8",
                    "secondary-container": "#7000ff",
                    "error-container": "#93000a",
                    "surface-container-low": "#1a1c20",
                    "surface": "#111317",
                    "on-surface": "#e2e2e8",
                    "primary-fixed-dim": "#00dbe9",
                    "on-primary-fixed": "#002022",
                    "background": "#111317",
                    "outline": "#849495",
                    "surface-dim": "#111317",
                    "tertiary-fixed-dim": "#ffb1c3",
                    "on-error-container": "#ffdad6",
                    "surface-container-high": "#282a2e",
                    "on-tertiary-fixed": "#3f0019",
                    "on-secondary": "#3c0090",
                    "surface-variant": "#333539",
                    "on-error": "#690005",
                    "surface-tint": "#00dbe9",
                    "outline-variant": "#3b494b",
                    "error": "#ffb4ab",
                    "primary-container": "#00f0ff",
                    "on-surface-variant": "#b9cacb",
                    "on-secondary-fixed": "#23005b",
                    "secondary-fixed-dim": "#d1bcff",
                    "tertiary": "#fff3f4",
                    "surface-bright": "#37393e"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "spacing": {
                    "container-padding": "24px",
                    "gutter": "16px",
                    "base": "8px",
                    "element-gap": "12px",
                    "section-gap": "48px"
            },
            "fontFamily": {
                    "display-lg": ["Plus Jakarta Sans"],
                    "body-sm": ["Inter"],
                    "headline-lg-mobile": ["Plus Jakarta Sans"],
                    "label-caps": ["JetBrains Mono"],
                    "body-md": ["Inter"],
                    "headline-lg": ["Plus Jakarta Sans"]
            },
            "fontSize": {
                    "display-lg": ["56px", {"lineHeight": "64px", "letterSpacing": "-0.04em", "fontWeight": "800"}],
                    "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "headline-lg-mobile": ["28px", {"lineHeight": "36px", "fontWeight": "700"}],
                    "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.1em", "fontWeight": "600"}],
                    "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}]
            }
          },
        },
      }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-background font-body-md overflow-hidden">
<!-- TopAppBar -->
<header class="bg-surface/80 backdrop-blur-xl text-primary docked full-width top-0 z-10 border-b border-outline-variant/10 shadow-sm shadow-primary/5 flex justify-between items-center h-20 px-container-padding w-full sticky top-0">
<div class="flex items-center gap-element-gap">
<button aria-label="Open Menu" class="p-base active:scale-95 transition-transform">
<span class="material-symbols-outlined text-primary text-3xl">menu</span>
</button>
<span class="font-display-lg text-[24px] leading-tight text-primary tracking-tighter">Gestobar</span>
</div>
<div class="flex items-center gap-base">
<button class="p-base hover:bg-surface-container-high transition-colors duration-200 rounded-full active:scale-95">
<span class="material-symbols-outlined">notifications</span>
</button>
<button class="p-base hover:bg-surface-container-high transition-colors duration-200 rounded-full active:scale-95">
<span class="material-symbols-outlined">account_circle</span>
</button>
</div>
</header>
<!-- Content Canvas (Locked with Blur) -->
<main class="p-container-padding space-y-gutter pb-32 blur-sm pointer-events-none opacity-40">
<!-- Welcome Section -->
<section>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">Dashboard</h1>
<p class="text-on-surface-variant font-body-sm">Resumen de hoy en tiempo real</p>
</section>
<!-- KPI Bento Grid -->
<div class="grid grid-cols-2 gap-base">
<div class="bg-surface-container p-base rounded-lg border border-outline-variant/10 flex flex-col justify-between aspect-square">
<div class="flex justify-between items-start">
<span class="material-symbols-outlined text-primary">payments</span>
<span class="text-label-caps font-label-caps text-on-surface-variant">+12%</span>
</div>
<div>
<span class="text-label-caps font-label-caps text-on-surface-variant block">Ventas</span>
<span class="font-headline-lg-mobile text-headline-lg-mobile text-primary">$1.4k</span>
</div>
</div>
<div class="bg-surface-container p-base rounded-lg border border-outline-variant/10 flex flex-col justify-between aspect-square">
<div class="flex justify-between items-start">
<span class="material-symbols-outlined text-secondary">confirmation_number</span>
<span class="text-label-caps font-label-caps text-on-surface-variant">42 hoy</span>
</div>
<div>
<span class="text-label-caps font-label-caps text-on-surface-variant block">Tickets</span>
<span class="font-headline-lg-mobile text-headline-lg-mobile text-secondary">158</span>
</div>
</div>
</div>
<!-- Main Analytics Card -->
<div class="bg-surface-container p-container-padding rounded-lg border border-outline-variant/10 space-y-base">
<div class="flex justify-between items-center">
<h3 class="font-body-md font-bold text-on-surface">Flujo de Clientes</h3>
<span class="material-symbols-outlined text-on-surface-variant">more_vert</span>
</div>
<div class="h-32 w-full bg-surface-container-low rounded-lg relative overflow-hidden flex items-end px-2 pb-2 gap-1">
<div class="w-full bg-primary/20 h-[40%] rounded-sm"></div>
<div class="w-full bg-primary/20 h-[65%] rounded-sm"></div>
<div class="w-full bg-primary/40 h-[90%] rounded-sm"></div>
<div class="w-full bg-primary h-[75%] rounded-sm"></div>
<div class="w-full bg-primary/60 h-[50%] rounded-sm"></div>
<div class="w-full bg-primary/30 h-[35%] rounded-sm"></div>
<div class="w-full bg-primary/20 h-[20%] rounded-sm"></div>
</div>
</div>
</main>
<!-- SideNavBar (EXPLICITLY OPEN) -->
<aside class="fixed inset-0 z-[100] transition-all duration-300">
<!-- Semi-transparent overlay backdrop -->
<div class="absolute inset-0 bg-black/60 backdrop-blur-sm opacity-100 transition-opacity"></div>
<!-- Drawer Container -->
<div class="bg-surface-container border-r border-outline-variant/10 h-screen fixed left-0 top-0 overflow-y-auto shadow-2xl shadow-black/80 flex flex-col py-8 translate-x-0 transition-transform duration-300 w-[85%] max-w-[320px]">
<div class="px-container-padding mb-10">
<div class="w-12 h-12 bg-primary/20 border border-primary/30 rounded-lg mb-4 flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-3xl font-bold">restaurant</span>
</div>
<h2 class="font-display-lg text-[28px] text-primary tracking-tighter">Gestobar</h2>
<p class="text-on-surface-variant font-body-sm">Administración Pro</p>
</div>
<nav class="flex-1 px-4 space-y-2">
<!-- Punto de Venta -->
<a class="flex items-center gap-element-gap text-on-surface-variant px-4 py-3 rounded-lg hover:bg-surface-container-highest hover:text-on-surface transition-all duration-200" href="#">
<span class="material-symbols-outlined" data-icon="point_of_sale">point_of_sale</span>
<span class="font-body-md font-medium">Punto de Venta</span>
</a>
<!-- Dashboard (ACTIVE) -->
<a class="flex items-center gap-element-gap bg-primary-container/20 border border-primary/20 text-primary-fixed-dim rounded-lg px-4 py-3 shadow-lg shadow-primary/5 transition-all" href="#">
<span class="material-symbols-outlined fill-1" data-icon="dashboard">dashboard</span>
<span class="font-body-md font-bold">Dashboard</span>
</a>
<!-- Gestión de Menú -->
<a class="flex items-center gap-element-gap text-on-surface-variant px-4 py-3 rounded-lg hover:bg-surface-container-highest hover:text-on-surface transition-all duration-200" href="#">
<span class="material-symbols-outlined" data-icon="restaurant_menu">restaurant_menu</span>
<span class="font-body-md font-medium">Gestión de Menú</span>
</a>
<!-- Usuarios -->
<a class="flex items-center gap-element-gap text-on-surface-variant px-4 py-3 rounded-lg hover:bg-surface-container-highest hover:text-on-surface transition-all duration-200" href="#">
<span class="material-symbols-outlined" data-icon="group">group</span>
<span class="font-body-md font-medium">Usuarios</span>
</a>
</nav>
<div class="px-4 pt-6 mt-auto border-t border-outline-variant/10 space-y-4 pb-8">
<!-- Secondary Actions -->
<div class="space-y-1">
<button class="w-full flex items-center gap-element-gap text-on-surface-variant px-4 py-3 hover:bg-surface-container-highest rounded-lg transition-all">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
<span class="font-body-md">Ajustes</span>
</button>
<button class="w-full flex items-center gap-element-gap text-error/80 px-4 py-3 hover:bg-error-container/10 rounded-lg transition-all">
<span class="material-symbols-outlined" data-icon="logout">logout</span>
<span class="font-body-md">Cerrar Sesión</span>
</button>
</div>
<!-- Primary CTA -->
<button class="w-full bg-primary text-on-primary font-bold py-4 rounded-xl shadow-lg shadow-primary/20 active:scale-95 transition-all text-sm uppercase tracking-wider">
                    Cerrar Turno
                </button>
</div>
</div>
</aside>
</body></html>
